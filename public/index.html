<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניהול הזמנות - סוכנים</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 25px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: #e2e8f0;
            color: var(--text-color);
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input,
        select,
        textarea {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        button.submit-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        button.submit-btn:hover {
            background: var(--primary-hover);
        }

        .clients-list {
            margin-top: 30px;
        }

        .client-card {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            border-right: 5px solid var(--primary-color);
            box-shadow: 0 2px 4px rgb(0 0 0 / 0.05);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .client-info h3 {
            margin: 0 0 5px 0;
            color: var(--primary-color);
        }

        .client-info p {
            margin: 3px 0;
            font-size: 14px;
            color: #64748b;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #dc2626;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>מערכת ניהול הזמנות וסיכומים</h1>
            <p>מערכת מרכזית לסוכני נסיעות</p>
        </header>

        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('standard')">ניהול הזמנה רגיל</button>
                <button class="tab-btn" onclick="switchTab('summary')">סיכום הזמנה מפורט</button>
            </div>

            <!-- טופס רגיל -->
            <form id="standardForm" class="form-section active" onsubmit="saveClient(event, 'standard')">
                <input type="hidden" name="formType" value="standard">
                <div class="grid">
                    <div class="form-group">
                        <label>שם הלקוח</label>
                        <input type="text" name="clientName" required>
                    </div>
                    <div class="form-group">
                        <label>טלפון</label>
                        <input type="text" name="phone">
                    </div>
                    <div class="form-group">
                        <label>סוג הזמנה</label>
                        <select name="bookingType">
                            <option value="flight_hotel">טיסה + מלון</option>
                            <option value="flight">טיסה בלבד</option>
                            <option value="hotel">מלון בלבד</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>מספר PNR</label>
                        <input type="text" name="pnr">
                    </div>
                    <div class="form-group">
                        <label>מספר טיסה</label>
                        <input type="text" name="flightNumber">
                    </div>
                    <div class="form-group">
                        <label>תאריך יציאה</label>
                        <input type="date" name="departureDate">
                    </div>
                    <div class="form-group">
                        <label>תאריך חזרה</label>
                        <input type="date" name="returnDate">
                    </div>
                    <div class="form-group">
                        <label>שם המלון</label>
                        <input type="text" name="hotelName">
                    </div>
                </div>
                <div class="form-group">
                    <label>הערות</label>
                    <textarea name="notes"></textarea>
                </div>
                <button type="submit" class="submit-btn" style="margin-top: 15px;">שמור הזמנה</button>
            </form>

            <!-- טופס סיכום הזמנה -->
            <form id="summaryForm" class="form-section" onsubmit="saveClient(event, 'summary')">
                <input type="hidden" name="formType" value="summary">
                <div class="grid">
                    <div class="form-group">
                        <label>שם הלקוח</label>
                        <input type="text" name="clientName" required>
                    </div>
                    <div class="form-group">
                        <label>טלפון</label>
                        <input type="text" name="phone">
                    </div>
                    <div class="form-group">
                        <label>יעד</label>
                        <input type="text" name="destination">
                    </div>
                    <div class="form-group">
                        <label>תאריכים (סיכום)</label>
                        <input type="text" name="datesSummary" placeholder="לדוגמה: 12/08 - 18/08">
                    </div>
                    <div class="form-group">
                        <label>חברת תעופה</label>
                        <input type="text" name="airline">
                    </div>
                    <div class="form-group">
                        <label>עלות כוללת</label>
                        <input type="text" name="totalCost" placeholder="לדוגמה: $1,200">
                    </div>
                </div>
                <div class="form-group">
                    <label>פרטי טיסות ושעות</label>
                    <textarea name="notes" placeholder="שעות הלוך וחזור, פרטי כבודה..."></textarea>
                </div>
                <button type="submit" class="submit-btn" style="margin-top: 15px;">שמור סיכום הזמנה</button>
            </form>
        </div>

        <div class="card clients-list">
            <h2>הזמנות וסיכומים שמורים</h2>
            <div id="clientsContainer">טוען נתונים...</div>
        </div>
    </div>

    <script>
        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(sec => sec.classList.remove('active'));

            if (type === 'standard') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('standardForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('summaryForm').classList.add('active');
            }
        }

        async function loadClients() {
            try {
                const res = await fetch('/api/clients');
                const clients = await res.json();
                renderClients(clients);
            } catch (e) {
                console.error('שגיאה בטעינת נתונים מהשרת, טוען מגיבוי מקומי');
                const local = JSON.parse(localStorage.getItem('fallback_clients') || '[]');
                renderClients(local);
            }
        }

        async function saveClient(event, type) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                const res = await fetch('/api/clients', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    form.reset();
                    loadClients();
                    alert('הנתונים נשמרו בהצלחה!');
                } else {
                    alert('שגיאה בשמירה');
                }
            } catch (e) {
                // גיבוי מקומי במידה והשרת נם
                data.id = Date.now().toString();
                let local = JSON.parse(localStorage.getItem('fallback_clients') || '[]');
                local.unshift(data);
                localStorage.setItem('fallback_clients', JSON.stringify(local));
                form.reset();
                renderClients(local);
                alert('הנתונים נשמרו מקומית בהצלחה!');
            }
        }

        async function deleteClient(id) {
            if (!confirm('האם אתה בטוח שברצונך למחוק?')) return;
            try {
                await fetch(`/api/clients/${id}`, { method: 'DELETE' });
                loadClients();
            } catch (e) {
                let local = JSON.parse(localStorage.getItem('fallback_clients') || '[]');
                local = local.filter(c => c.id !== id);
                localStorage.setItem('fallback_clients', JSON.stringify(local));
                renderClients(local);
            }
        }

        function renderClients(clients) {
            const container = document.getElementById('clientsContainer');
            if (!clients.length) {
                container.innerHTML = '<p style="color: #64748b;">אין הזמנות שמורות כרגע.</p>';
                return;
            }

            container.innerHTML = clients.map(c => `
            <div class="client-card">
                <div class="client-info">
                    <h3>${c.clientName || 'לקוח'} (${c.formType === 'summary' ? 'סיכום הזמנה' : 'הזמנה רגילה'})</h3>
                    <p><strong>טלפון:</strong> ${c.phone || 'לא צויין'}</p>
                    <p><strong>פרטים:</strong> ${c.destination || c.hotelName || c.pnr || c.notes || 'אין פרטים נוספים'}</p>
                    <p><strong>עלות/הערות:</strong> ${c.totalCost || c.notes || '-'}</p>
                </div>
                <button class="delete-btn" onclick="deleteClient('${c.id}')">מחק</button>
            </div>
        `).join('');
        }

        // טעינת רשימה בעליית הדף
        loadClients();
    </script>

</body>

</html>
