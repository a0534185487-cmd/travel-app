<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM סוכנות נסיעות פרימיום</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --card-border: #334155;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --whatsapp-color: #10b981;
            --whatsapp-hover: #059669;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
        }

        header h1 {
            color: var(--text-color);
            margin: 0;
            font-size: 22px;
        }

        .install-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }

        .install-btn:hover {
            background: var(--primary-hover);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-card span {
            display: block;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .stat-card strong {
            font-size: 24px;
            color: var(--text-color);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
            margin-bottom: 25px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--card-border);
            background: #0f172a;
            color: var(--text-muted);
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
            color: var(--text-muted);
        }

        input,
        select,
        textarea {
            padding: 10px;
            background: #0f172a;
            border: 1px solid var(--card-border);
            color: var(--text-color);
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        button.submit-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        button.submit-btn:hover {
            background: var(--primary-hover);
        }

        .search-box {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #0f172a;
            border: 1px solid var(--card-border);
            color: var(--text-color);
            border-radius: 8px;
            font-size: 14px;
        }

        .clients-list {
            margin-top: 30px;
        }

        .client-card {
            background: #111827;
            border: 1px solid var(--card-border);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .client-info h3 {
            margin: 0 0 5px 0;
            color: var(--text-color);
            font-size: 18px;
        }

        .client-info p {
            margin: 4px 0;
            font-size: 14px;
            color: var(--text-muted);
        }

        .actions-btns {
            display: flex;
            gap: 8px;
        }

        .whatsapp-btn {
            background: var(--whatsapp-color);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }

        .whatsapp-btn:hover {
            background: var(--whatsapp-hover);
        }

        .delete-btn {
            background: var(--danger-color);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .delete-btn:hover {
            background: var(--danger-hover);
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>CRM סוכנות נסיעות פרימיום ✈️</h1>
            <button id="installAppBtn" class="install-btn" onclick="installApp()">📥 הורד אפליקציה</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span>סך הכל הזמנות</span>
                <strong id="statTotal">0</strong>
            </div>
            <div class="stat-card">
                <span>הזמנות טיסות</span>
                <strong id="statFlights">0</strong>
            </div>
            <div class="stat-card">
                <span>הזמנות מלונות</span>
                <strong id="statHotels">0</strong>
            </div>
            <div class="stat-card">
                <span>חבילות משולבות</span>
                <strong id="statPackages">0</strong>
            </div>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('standard')">ניהול הזמנה רגיל</button>
                <button class="tab-btn" onclick="switchTab('summary')">סיכום הזמנה מפורט</button>
            </div>

            <!-- טופס רגיל (ניהול לקוח) -->
            <form id="standardForm" class="form-section active" onsubmit="saveClient(event, 'standard')">
                <input type="hidden" name="formType" value="standard">
                <div class="grid">
                    <div class="form-group">
                        <label>שם הלקוח</label>
                        <input type="text" name="clientName" required>
                    </div>
                    <div class="form-group">
                        <label>טלפון</label>
                        <input type="text" name="phone">
                    </div>
                    <div class="form-group">
                        <label>סוג הזמנה</label>
                        <select name="bookingType">
                            <option value="flight_hotel">טיסה + מלון</option>
                            <option value="flight">טיסה בלבד</option>
                            <option value="hotel">מלון בלבד</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>מספר PNR</label>
                        <input type="text" name="pnr">
                    </div>
                    <div class="form-group">
                        <label>מספר טיסה</label>
                        <input type="text" name="flightNumber">
                    </div>
                    <div class="form-group">
                        <label>תאריך יציאה</label>
                        <input type="date" name="departureDate" class="auto-date">
                    </div>
                    <div class="form-group">
                        <label>תאריך חזרה</label>
                        <input type="date" name="returnDate" class="auto-date">
                    </div>
                    <div class="form-group">
                        <label>שם המלון</label>
                        <input type="text" name="hotelName">
                    </div>
                </div>
                <div class="form-group">
                    <label>הערות</label>
                    <textarea name="notes"></textarea>
                </div>
                <button type="submit" class="submit-btn" style="margin-top: 15px;">שמור הזמנה רגילה</button>
            </form>

            <!-- טופס סיכום הזמנה מפורט -->
            <form id="summaryForm" class="form-section" onsubmit="saveClient(event, 'summary')">
                <input type="hidden" name="formType" value="summary">
                <div class="grid">
                    <div class="form-group">
                        <label>שם הלקוח</label>
                        <input type="text" name="clientName" required>
                    </div>
                    <div class="form-group">
                        <label>טלפון</label>
                        <input type="text" name="phone">
                    </div>
                    <div class="form-group">
                        <label>תאריך התחלה (הלוך)</label>
                        <input type="date" name="startDate" class="auto-date">
                    </div>
                    <div class="form-group">
                        <label>תאריך סיום (חזרה)</label>
                        <input type="date" name="endDate" class="auto-date">
                    </div>
                    <div class="form-group">
                        <label>יעד</label>
                        <input type="text" name="destination" placeholder="לדוגמה: פריז, צרפת">
                    </div>
                    <div class="form-group">
                        <label>חברת תעופה</label>
                        <input type="text" name="airline">
                    </div>
                    <div class="form-group">
                        <label>שעת המראה הלוך</label>
                        <input type="text" name="depFlightTime" placeholder="לדוגמה: 08:30">
                    </div>
                    <div class="form-group">
                        <label>שעת המראה חזור</label>
                        <input type="text" name="retFlightTime" placeholder="לדוגמה: 19:45">
                    </div>
                    <div class="form-group">
                        <label>מזוודות מה כן כולל</label>
                        <input type="text" name="luggageDetails" placeholder="לדוגמה: טרולי + מזוודה 23 קג">
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>שמות הנוסעים לפי דרכון באנגלית (שורה לכל נוסע)</label>
                        <textarea name="passengersPassports" placeholder="ISRAEL ISRAELI&#10;SARAH ISRAELI"></textarea>
                    </div>
                    <div class="form-group">
                        <label>שם מלון</label>
                        <input type="text" name="hotelName">
                    </div>
                    <div class="form-group">
                        <label>עיר המלון</label>
                        <input type="text" name="hotelCity">
                    </div>
                    <div class="form-group">
                        <label>הרכב החדר</label>
                        <input type="text" name="roomComposition" placeholder="לדוגמה: 2 מבוגרים + ילד">
                    </div>
                    <div class="form-group">
                        <label>בסיס פנסיון</label>
                        <input type="text" name="boardBasis" placeholder="לדוגמה: לינה וארוחת בוקר / הכל כלול">
                    </div>
                    <div class="form-group">
                        <label>שם חדר</label>
                        <input type="text" name="roomName" placeholder="לדוגמה: חדר זוגי סטנדרט עם נוף לעיר">
                    </div>
                    <div class="form-group">
                        <label>תנאי ביטול ההזמנה</label>
                        <input type="text" name="cancellationTerms" placeholder="לדוגמה: ללא דמי ביטול עד 14 יום לפני">
                    </div>
                    <div class="form-group">
                        <label>סה"כ עלות ההזמנה</label>
                        <input type="text" name="totalCost" placeholder="לדוגמה: $1,500">
                    </div>
                </div>
                <button type="submit" class="submit-btn" style="margin-top: 15px;">שמור סיכום הזמנה</button>
            </form>
        </div>

        <div class="card clients-list">
            <h2>הזמנות וסיכומים שמורים</h2>
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 חפש לפי שם לקוח, טלפון או יעד..."
                oninput="filterClients()">
            <div id="clientsContainer">טוען נתונים...</div>
        </div>
    </div>

    <script>
        let allClients = [];

        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.querySelectorAll('.auto-date').forEach(input => {
                if (!input.value) input.value = today;
            });
            loadClients();
        });

        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(sec => sec.classList.remove('active'));

            if (type === 'standard') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('standardForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('summaryForm').classList.add('active');
            }
        }

        async function loadClients() {
            try {
                const res = await fetch('/api/clients');
                allClients = await res.json();
                renderClients(allClients);
            } catch (e) {
                allClients = JSON.parse(localStorage.getItem('fallback_clients') || '[]');
                renderClients(allClients);
            }
            updateStats();
        }

        async function saveClient(event, type) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                const res = await fetch('/api/clients', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    form.reset();
                    loadClients();
                } else {
                    alert('שגיאה בשמירה');
                }
            } catch (e) {
                data.id = Date.now().toString();
                allClients.unshift(data);
                localStorage.setItem('fallback_clients', JSON.stringify(allClients));
                form.reset();
                renderClients(allClients);
                updateStats();
            }
        }

        async function deleteClient(id) {
            if (!confirm('האם אתה בטוח שברצונך למחוק?')) return;
            try {
                const res = await fetch(`/api/clients/${id}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) {
                    loadClients();
                } else {
                    throw new Error();
                }
            } catch (e) {
                allClients = allClients.filter(c => c.id !== id);
                localStorage.setItem('fallback_clients', JSON.stringify(allClients));
                renderClients(allClients);
                updateStats();
            }
        }

        function filterClients() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allClients.filter(c => {
                const name = (c.clientName || '').toLowerCase();
                const phone = (c.phone || '').toLowerCase();
                const dest = (c.destination || c.hotelName || '').toLowerCase();
                return name.includes(query) || phone.includes(query) || dest.includes(query);
            });
            renderClients(filtered);
        }

        function updateStats() {
            document.getElementById('statTotal').innerText = allClients.length;
            let flights = 0, hotels = 0, packages = 0;
            allClients.forEach(c => {
                if (c.formType === 'summary' || c.bookingType === 'flight_hotel') packages++;
                else if (c.bookingType === 'flight') flights++;
                else if (c.bookingType === 'hotel') hotels++;
            });
            document.getElementById('statFlights').innerText = flights;
            document.getElementById('statHotels').innerText = hotels;
            document.getElementById('statPackages').innerText = packages;
        }

        function sendWhatsApp(index) {
            const c = allClients[index];
            let text = '';
            if (c.formType === 'summary') {
                const datesFormatted = (c.startDate && c.endDate) ? `${c.startDate} - ${c.endDate}` : (c.datesSummary || '-');
                text = `*סיכום הזמנה עבור: ${c.clientName || 'לקוח'}*
טלפון: ${c.phone || '-'}
----------------------------------
*תאריכים:* ${datesFormatted}
*יעד:* ${c.destination || '-'}
*חברת תעופה:* ${c.airline || '-'}
*שעת המראה הלוך:* ${c.depFlightTime || '-'}
*שעת המראה חזור:* ${c.retFlightTime || '-'}
*מזוודות מה כן כולל:* ${c.luggageDetails || '-'}
*שמות הנוסעים לפי דרכון באנגלית:*
${c.passengersPassports || '-'}
----------------------------------
*שם מלון:* ${c.hotelName || '-'}
*עיר המלון:* ${c.hotelCity || '-'}
*הרכב החדר:* ${c.roomComposition || '-'}
*בסיס פנסיון:* ${c.boardBasis || '-'}
*שם חדר:* ${c.roomName || '-'}
*תנאי ביטול ההזמנה:* ${c.cancellationTerms || '-'}
----------------------------------
⚠️ *אין באחריותי על שינוי הלו"ז של הטיסה*
💰 *סה"כ עלות ההזמנה:* ${c.totalCost || '-'}`;
            } else {
                text = `*פרטי הזמנה רגילה: ${c.clientName || 'לקוח'}*
טלפון: ${c.phone || '-'}
סוג הזמנה: ${c.bookingType || '-'}
PNR: ${c.pnr || '-'}
מספר טיסה: ${c.flightNumber || '-'}
יציאה: ${c.departureDate || '-'} | חזרה: ${c.returnDate || '-'}
מלון: ${c.hotelName || '-'}
הערות: ${c.notes || '-'}`;
            }

            // העתקה אוטומטית ללוח ופתיחת וואטסאפ ווב / אפליקציה באופן נקי ללא שגיאות
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ הטקסט הועתק אוטומטית לזיכרון!\n\nחלון וואטסאפ ייפתח כעת. כל שעליך לעשות הוא ללחוץ על חלון השיחה ולהדביק (Cmd + V).');
                window.open('https://web.whatsapp.com', '_blank');
            }).catch(err => {
                alert('שגיאה בהעתקת הטקסט ללוח.');
            });
        }

        function renderClients(clients) {
            const container = document.getElementById('clientsContainer');
            if (!clients.length) {
                container.innerHTML = '<p style="color: var(--text-muted);">אין הזמנות שמורות כרגע.</p>';
                return;
            }

            container.innerHTML = clients.map((c, idx) => `
                <div class="client-card">
                    <div class="client-info">
                        <h3>${c.clientName || 'לקוח'} (${c.formType === 'summary' ? 'סיכום הזמנה' : 'הזמנה רגילה'})</h3>
                        <p><strong>טלפון:</strong> ${c.phone || 'לא צויין'}</p>
                        <p><strong>יעד/מלון:</strong> ${c.destination || c.hotelName || 'לא צויין'}</p>
                        <p><strong>עלות/פרטים:</strong> ${c.totalCost || c.notes || '-'}</p>
                    </div>
                    <div class="actions-btns">
                        <button class="whatsapp-btn" onclick="sendWhatsApp(${idx})">💬 WhatsApp</button>
                        <button class="delete-btn" onclick="deleteClient('${c.id}')">מחק</button>
                    </div>
                </div>
            `).join('');
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    deferredPrompt = null;
                });
            } else {
                alert('📱 התקנת האפליקציה למכשיר:\n\n• במחשב Mac / Windows (Chrome/Edge): לחץ על שלוש הנקודות בדפדפן ובחר "התקן אפליקציה..." (Install App) או סמל ההתקנה בשורת הכתובת.\n• באייפון (Safari): לחץ על כפתור השיתוף ובחר "הוסף למסך הבית".\n• באנדרואיד: לחץ על תפריט הדפדפן ובחר "הוסף למסך הבית".');
            }
        }
    </script>

</body>

</html>
