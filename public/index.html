<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM סוכנות נסיעות פרימיום</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --whatsapp-color: #10b981;
            --whatsapp-hover: #059669;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --input-bg: #f8fafc;
            --badge-bg: #dbeafe;
            --badge-text: #1e40af;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: var(--card-bg);
            padding: 18px 30px;
            border-radius: 16px;
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.03);
        }

        header h1 {
            color: var(--text-color);
            margin: 0;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-base {
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .install-btn {
            background: var(--primary-color);
            color: white;
        }

        .install-btn:hover {
            background: var(--primary-hover);
        }

        .logout-btn {
            background: #fee2e2;
            color: var(--danger-color);
        }

        .logout-btn:hover {
            background: var(--danger-color);
            color: white;
        }

        /* מסך התחברות יוקרתי */
        #loginScreen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 85vh;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.05);
            text-align: center;
        }

        .login-card h2 {
            margin-top: 0;
            color: var(--text-color);
            font-size: 24px;
        }

        .login-card .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        #appContent {
            display: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 22px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 2px 4px rgb(0 0 0 / 0.02);
        }

        .stat-card span {
            display: block;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .stat-card strong {
            font-size: 28px;
            color: var(--text-color);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.02);
            margin-bottom: 25px;
        }

        /* עיצוב טאבים מודרני ונקי */
        .tabs-header {
            display: flex;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 12px;
            margin-bottom: 25px;
            gap: 6px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: white;
            color: var(--primary-color);
            box-shadow: 0 2px 4px rgb(0 0 0 / 0.05);
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }

        input,
        select,
        textarea {
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: var(--text-color);
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.2s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea {
            resize: vertical;
            height: 90px;
        }

        button.submit-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        button.submit-btn:hover {
            background: var(--primary-hover);
        }

        .search-box {
            width: 100%;
            padding: 14px;
            margin-bottom: 25px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: var(--text-color);
            border-radius: 12px;
            font-size: 14px;
        }

        .clients-list {
            margin-top: 30px;
        }

        .client-card {
            background: #ffffff;
            border: 1px solid var(--card-border);
            padding: 22px;
            border-radius: 14px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            box-shadow: 0 2px 4px rgb(0 0 0 / 0.01);
            transition: transform 0.2s;
        }

        .client-card:hover {
            border-color: #cbd5e1;
        }

        .client-info h3 {
            margin: 0 0 8px 0;
            color: var(--text-color);
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .client-info p {
            margin: 5px 0;
            font-size: 14px;
            color: var(--text-muted);
        }

        .actions-btns {
            display: flex;
            gap: 10px;
        }

        .whatsapp-btn {
            background: var(--whatsapp-color);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 2px 6px rgba(16, 185, 129, 0.2);
        }

        .whatsapp-btn:hover {
            background: var(--whatsapp-hover);
        }

        .delete-btn {
            background: #fee2e2;
            color: var(--danger-color);
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .delete-btn:hover {
            background: var(--danger-color);
            color: white;
        }

        /* התראת טיסה קרובה (24 שעות) */
        .flight-alert-badge {
            background: #fef3c7;
            color: #d97706;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>

<body>

    <!-- מסך התחברות חדש ומאובטח לפי שם משתמש וסיסמה -->
    <div id="loginScreen">
        <div class="login-card">
            <h2>כניסת סוכנים מאובטחת ✈️</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 25px;">הזן שם משתמש וסיסמה אישית לכניסה
                לאזור שלך</p>
            <form onsubmit="loginUser(event)">
                <div class="form-group">
                    <label>שם משתמש</label>
                    <input type="text" id="usernameInput" required placeholder="לדוגמה: ori">
                </div>
                <div class="form-group">
                    <label>סיסמה אישית</label>
                    <input type="password" id="passwordInput" required placeholder="••••••••">
                </div>
                <button type="submit" class="submit-btn" style="margin-top: 10px;">כניסה למערכת</button>
            </form>
            <p style="color: var(--text-muted); font-size: 12px; margin-top: 20px;">* סוכן חדש? הקלד שם וסיסמה לבחירתך
                והמערכת תיצור לך אזור אישי.</p>
        </div>
    </div>

    <!-- האפליקציה הראשית -->
    <div id="appContent" class="container">
        <header>
            <h1>CRM סוכנות נסיעות פרימיום ✈️ <span id="currentAgentName"
                    style="color: var(--primary-color); font-size: 16px; background: #eff6ff; padding: 4px 12px; border-radius: 8px;"></span>
            </h1>
            <div class="header-actions">
                <button id="installAppBtn" class="btn-base install-btn" onclick="installApp()">📥 הורד אפליקציה</button>
                <button class="btn-base logout-btn" onclick="logoutUser()">התנתק</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span>סך הכל הזמנות</span>
                <strong id="statTotal">0</strong>
            </div>
            <div class="stat-card">
                <span>הזמנות טיסות</span>
                <strong id="statFlights">0</strong>
            </div>
            <div class="stat-card">
                <span>הזמנות מלונות</span>
                <strong id="statHotels">0</strong>
            </div>
            <div class="stat-card">
                <span>חבילות משולבות</span>
                <strong id="statPackages">0</strong>
            </div>
        </div>

        <div class="card">
            <!-- טאבים מעוצבים ונקיים במקום כפתורים זרוקים -->
            <div class="tabs-header">
                <button class="tab-btn active" onclick="switchTab('standard')">ניהול הזמנה רגיל</button>
                <button class="tab-btn" onclick="switchTab('summary')">סיכום הזמנה מפורט</button>
            </div>

            <!-- טופס רגיל (ניהול לקוח) -->
            <form id="standardForm" class="form-section active" onsubmit="saveClient(event, 'standard')">
                <input type="hidden" name="formType" value="standard">
                <div class="grid">
                    <div class="form-group">
                        <label>שם הלקוח</label>
                        <input type="text" name="clientName" required>
                    </div>
                    <div class="form-group">
                        <label>טלפון</label>
                        <input type="text" name="phone">
                    </div>
                    <div class="form-group">
                        <label>סוג הזמנה</label>
                        <select name="bookingType">
                            <option value="flight_hotel">טיסה + מלון</option>
                            <option value="flight">טיסה בלבד</option>
                            <option value="hotel">מלון בלבד</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>מספר PNR</label>
                        <input type="text" name="pnr">
                    </div>
                    <div class="form-group">
                        <label>מספר טיסה</label>
                        <input type="text" name="flightNumber">
                    </div>
                    <div class="form-group">
                        <label>תאריך יציאה</label>
                        <input type="date" name="departureDate" class="auto-date">
                    </div>
                    <div class="form-group">
                        <label>תאריך חזרה</label>
                        <input type="date" name="returnDate" class="auto-date">
                    </div>
                    <div class="form-group">
                        <label>שם המלון</label>
                        <input type="text" name="hotelName">
                    </div>
                </div>
                <div class="form-group">
                    <label>הערות</label>
                    <textarea name="notes"></textarea>
                </div>
                <button type="submit" class="submit-btn" style="margin-top: 15px;">שמור הזמנה רגילה</button>
            </form>

            <!-- טופס סיכום הזמנה מפורט -->
            <form id="summaryForm" class="form-section" onsubmit="saveClient(event, 'summary')">
                <input type="hidden" name="formType" value="summary">
                <div class="grid">
                    <div class="form-group">
                        <label>שם הלקוח</label>
                        <input type="text" name="clientName" required>
                    </div>
                    <div class="form-group">
                        <label>טלפון</label>
                        <input type="text" name="phone">
                    </div>
                    <div class="form-group">
                        <label>תאריך התחלה (הלוך)</label>
                        <input type="date" name="startDate" class="auto-date">
                    </div>
                    <div class="form-group">
                        <label>תאריך סיום (חזרה)</label>
                        <input type="date" name="endDate" class="auto-date">
                    </div>
                    <div class="form-group">
                        <label>יעד</label>
                        <input type="text" name="destination" placeholder="לדוגמה: פריז, צרפת">
                    </div>
                    <div class="form-group">
                        <label>חברת תעופה</label>
                        <input type="text" name="airline">
                    </div>
                    <div class="form-group">
                        <label>שעת המראה הלוך</label>
                        <input type="text" name="depFlightTime" placeholder="לדוגמה: 08:30">
                    </div>
                    <div class="form-group">
                        <label>שעת המראה חזור</label>
                        <input type="text" name="retFlightTime" placeholder="לדוגמה: 19:45">
                    </div>
                    <div class="form-group">
                        <label>מזוודות מה כן כולל</label>
                        <input type="text" name="luggageDetails" placeholder="לדוגמה: טרולי + מזוודה 23 קג">
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>שמות הנוסעים לפי דרכון באנגלית (שורה לכל נוסע)</label>
                        <textarea name="passengersPassports" placeholder="ISRAEL ISRAELI&#10;SARAH ISRAELI"></textarea>
                    </div>
                    <div class="form-group">
                        <label>שם מלון</label>
                        <input type="text" name="hotelName">
                    </div>
                    <div class="form-group">
                        <label>עיר המלון</label>
                        <input type="text" name="hotelCity">
                    </div>
                    <div class="form-group">
                        <label>הרכב החדר</label>
                        <input type="text" name="roomComposition" placeholder="לדוגמה: 2 מבוגרים + ילד">
                    </div>
                    <div class="form-group">
                        <label>בסיס פנסיון</label>
                        <input type="text" name="boardBasis" placeholder="לדוגמה: לינה וארוחת בוקר / הכל כלול">
                    </div>
                    <div class="form-group">
                        <label>שם חדר</label>
                        <input type="text" name="roomName" placeholder="לדוגמה: חדר זוגי סטנדרט עם נוף לעיר">
                    </div>
                    <div class="form-group">
                        <label>תנאי ביטול ההזמנה</label>
                        <input type="text" name="cancellationTerms" placeholder="לדוגמה: ללא דמי ביטול עד 14 יום לפני">
                    </div>
                    <div class="form-group">
                        <label>סה"כ עלות ההזמנה</label>
                        <input type="text" name="totalCost" placeholder="לדוגמה: $1,500">
                    </div>
                </div>
                <button type="submit" class="submit-btn" style="margin-top: 15px;">שמור סיכום הזמנה</button>
            </form>
        </div>

        <div class="card clients-list">
            <h2>הזמנות וסיכומים שמורים שלך</h2>
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 חפש לפי שם לקוח, טלפון או יעד..."
                oninput="filterClients()">
            <div id="clientsContainer">טוען נתונים...</div>
        </div>
    </div>

    <script>
        let allClients = [];
        let currentAgent = '';

        document.addEventListener('DOMContentLoaded', () => {
            const savedAgent = localStorage.getItem('crm_current_agent');
            if (savedAgent) {
                currentAgent = savedAgent;
                showApp();
            }

            const today = new Date().toISOString().split('T')[0];
            document.querySelectorAll('.auto-date').forEach(input => {
                if (!input.value) input.value = today;
            });
        });

        function loginUser(event) {
            event.preventDefault();
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            if (!username || !password) return;

            // בדיקת אבטחה בסיסית של סיסמה שמורה במכשיר או רישום ראשוני
            const savedPass = localStorage.getItem(`pass_${username}`);
            if (savedPass && savedPass !== password) {
                alert('סיסמה שגויה עבור משתמש זה!');
                return;
            }
            if (!savedPass) {
                localStorage.setItem(`pass_${username}`, password);
            }

            currentAgent = username;
            localStorage.setItem('crm_current_agent', username);
            showApp();
        }

        function logoutUser() {
            localStorage.removeItem('crm_current_agent');
            currentAgent = '';
            document.getElementById('appContent').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('usernameInput').value = '';
            document.getElementById('passwordInput').value = '';
        }

        function showApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContent').style.display = 'block';
            document.getElementById('currentAgentName</u>').innerText = `סוכן: ${currentAgent}`;
            loadClients();
        }

        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(sec => sec.classList.remove('active'));

            if (type === 'standard') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('standardForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('summaryForm').classList.add('active');
            }
        }

        async function loadClients() {
            try {
                const res = await fetch(`/api/clients?agent=${encodeURIComponent(currentAgent)}`);
                allClients = await res.json();
                renderClients(allClients);
            } catch (e) {
                const storageKey = `fallback_clients_${currentAgent}`;
                allClients = JSON.parse(localStorage.getItem(storageKey) || '[]');
                renderClients(allClients);
            }
            updateStats();
        }

        async function saveClient(event, type) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            data.agent = currentAgent;

            try {
                const res = await fetch('/api/clients', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    form.reset();
                    const today = new Date().toISOString().split('T')[0];
                    document.querySelectorAll('.auto-date').forEach(input => {
                        input.value = today;
                    });
                    loadClients();
                } else {
                    alert('שגיאה בשמירה');
                }
            } catch (e) {
                data.id = Date.now().toString();
                allClients.unshift(data);
                const storageKey = `fallback_clients_${currentAgent}`;
                localStorage.setItem(storageKey, JSON.stringify(allClients));
                form.reset();
                const today = new Date().toISOString().split('T')[0];
                document.querySelectorAll('.auto-date').forEach(input => {
                    input.value = today;
                });
                renderClients(allClients);
                updateStats();
            }
        }

        async function deleteClient(id) {
            if (!confirm('האם אתה בטוח שברצונך למחוק?')) return;
            try {
                const res = await fetch(`/api/clients/${id}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) {
                    loadClients();
                } else {
                    throw new Error();
                }
            } catch (e) {
                allClients = allClients.filter(c => c.id !== id);
                const storageKey = `fallback_clients_${currentAgent}`;
                localStorage.setItem(storageKey, JSON.stringify(allClients));
                renderClients(allClients);
                updateStats();
            }
        }

        function filterClients() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allClients.filter(c => {
                const name = (c.clientName || '').toLowerCase();
                const phone = (c.phone || '').toLowerCase();
                const dest = (c.destination || c.hotelName || '').toLowerCase();
                return name.includes(query) || phone.includes(query) || dest.includes(query);
            });
            renderClients(filtered);
        }

        function updateStats() {
            document.getElementById('statTotal').innerText = allClients.length;
            let flights = 0, hotels = 0, packages = 0;
            allClients.forEach(c => {
                if (c.formType === 'summary' || c.bookingType === 'flight_hotel') packages++;
                else if (c.bookingType === 'flight') flights++;
                else if (c.bookingType === 'hotel') hotels++;
            });
            document.getElementById('statFlights').innerText = flights;
            document.getElementById('statHotels').innerText = hotels;
            document.getElementById('statPackages').innerText = packages;
        }

        // בדיקה האם הטיסה היא בתוך 24 שעות מהרגע הנוכחי
        function isFlightWithin24Hours(dateStr) {
            if (!dateStr) return false;
            const flightTime = new Date(dateStr).getTime();
            const now = new Date().getTime();
            const diffHours = (flightTime - now) / (1000 * 60 * 60);
            return diffHours >= 0 && diffHours <= 24;
        }

        function sendWhatsApp(index) {
            const c = allClients[index];
            let text = '';
            if (c.formType === 'summary') {
                const datesFormatted = (c.startDate && c.endDate) ? `${c.startDate} - ${c.endDate}` : (c.datesSummary || '-');
                text = `שלום ${c.clientName || 'לקוח'} 👋\nמצורפים פרטי ההזמנה שלך:\n\n✈️ טיסה:\n- הזמנה/PNR: ${c.airline || '-'}\n- מסלול: ${c.destination || '-'}\n- תאריך: ${datesFormatted}\n- שעות הלוך/חזור: ${c.depFlightTime || '-'} / ${c.retFlightTime || '-'}\n- מזוודות: ${c.luggageDetails || '-'}\n\n🏨 מלון: ${c.hotelName || '-'}\n- תאריכים: ${datesFormatted}\n- עיר: ${c.hotelCity || '-'}\n- הרכב חדר: ${c.roomComposition || '-'}\n- פנסיון: ${c.boardBasis || '-'}\n- סוג חדר: ${c.roomName || '-'}\n\n👥 שמות הנוסעים בדרכון:\n${c.passengersPassports || '-'}\n\n❌ תנאי ביטול: ${c.cancellationTerms || '-'}\n💰 סה"כ עלות: ${c.totalCost || '-'}\n\nחופשה מהנה ונעימה! 🌴`;
            } else {
                text = `שלום ${c.clientName || 'לקוח'} 👋\nמצורפים פרטי ההזמנה הרגילה שלך:\n\nסוג הזמנה: ${c.bookingType || '-'}\nPNR: ${c.pnr || '-'}\nמספר טיסה: ${c.flightNumber || '-'}\nיציאה: ${c.departureDate || '-'} | חזרה: ${c.returnDate || '-'}\nמלון: ${c.hotelName || '-'}\nהערות: ${c.notes || '-'}\n\nחופשה מהנה ונעימה! 🌴`;
            }

            let phoneNum = c.phone ? c.phone.replace(/[^0-9]/g, '') : '';
            if (phoneNum.startsWith('0')) {
                phoneNum = '972' + phoneNum.substring(1);
            }

            const encodedText = encodeURIComponent(text);
            const targetUrl = phoneNum ? `https://api.whatsapp.com/send?phone=${phoneNum}&text=${encodedText}` : `https://wa.me/?text=${encodedText}`;
            window.open(targetUrl, '_blank');
        }

        function renderClients(clients) {
            const container = document.getElementById('clientsContainer');
            if (!clients.length) {
                container.innerHTML = '<p style="color: var(--text-muted);">אין הזמנות שמורות כרגע.</p>';
                return;
            }

            container.innerHTML = clients.map((c, idx) => {
                const flightDate = c.formType === 'summary' ? c.startDate : c.departureDate;
                const show24hAlert = isFlightWithin24Hours(flightDate);

                return `
                <div class="client-card">
                    <div class="client-info">
                        <h3>
                            ${c.clientName || 'לקוח'} (${c.formType === 'summary' ? 'סיכום הזמנה' : 'הזמנה רגילה'})
                            ${show24hAlert ? '<span class="flight-alert-badge">⏰ טיסה בעוד פחות מ-24 שעות!</span>' : ''}
                        </h3>
                        <p><strong>טלפון:</strong> ${c.phone || 'לא צויין'}</p>
                        <p><strong>יעד/מלון:</strong> ${c.destination || c.hotelName || 'לא צויין'}</p>
                        <p><strong>עלות/פרטים:</strong> ${c.totalCost || c.notes || '-'}</p>
                    </div>
                    <div class="actions-btns">
                        <button class="whatsapp-btn" onclick="sendWhatsApp(${idx})">💬 WhatsApp</button>
                        <button class="delete-btn" onclick="deleteClient('${c.id}')">מחק</button>
                    </div>
                </div>
            `;
            }).join('');
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    deferredPrompt = null;
                });
            } else {
                alert('📱 התקנת האפליקציה למכשיר:\n\n• במחשב Mac / Windows (Chrome/Edge): לחץ על שלוש הנקודות בדפדפן ובחר "התקן אפליקציה..." (Install App) או סמל ההתקנה בשורת הכתובת.\n• באייפון (Safari): לחץ על כפתור השיתוף ובחר "הוסף למסך הבית".\n• באנדרואיד: לחץ על תפריט הדפדפן ובחר "הוסף למסך הבית".');
            }
        }
    </script>

</body>
