!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחולל דילים חכם מתקדם - CRM</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media(max-width: 950px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.2rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            max-height: 180px;
            overflow-y: auto;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .checkbox-item input {
            width: auto;
            cursor: pointer;
        }

        .preview-box {
            background: #0f172a;
            color: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.85rem;
            min-height: 350px;
            max-height: 550px;
            overflow-y: auto;
            direction: rtl;
            line-height: 1.5;
        }

        .btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: opacity 0.2s;
            margin-top: 15px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container" style="max-width: 100%;">
        <div style="grid-column: 1 / -1;">
            <a href="index.html" class="back-link">← חזרה ללוח בקרה הראשי (CRM)</a>
        </div>

        <!-- צד שמאל: הזנת נתונים -->
        <div>
            <!-- הגדרות סוכן קבועות -->
            <div class="card" style="border: 2px dashed var(--primary);">
                <h2>⚙️ הגדרות סוכן קבועות (נשמרות אוטומטית)</h2>
                <div class="form-group">
                    <label>👈 להזמנות חייגו עכשיו (קישור / טלפון):</label>
                    <input type="text" id="agentCall" placeholder="לדוגמה: tel:0500000000 או קישור"
                        oninput="saveAllData()">
                </div>
                <div class="form-group">
                    <label>👈 לשליחת ווצאפ (קישור ישיר):</label>
                    <input type="text" id="agentWhatsapp" placeholder="לדוגמה: https://wa.me/972500000000"
                        oninput="saveAllData()">
                </div>
                <div class="form-group">
                    <label>👈 לעוד דילים בקבוצה שקטה:</label>
                    <input type="text" id="agentGroup" placeholder="לדוגמה: https://chat.whatsapp.com/..."
                        oninput="saveAllData()">
                </div>
            </div>

            <!-- פרטי היעד והמלון -->
            <div class="card">
                <h2>✈️ פרטי היעד והמלון</h2>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>שם היעד (מדינה):</label>
                        <input type="text" id="destinationCountry" placeholder="לדוגמה: קפריסין"
                            oninput="saveAllData()">
                    </div>
                    <div class="form-group">
                        <label>שם העיר / אזור:</label>
                        <input type="text" id="destinationCity" placeholder="לדוגמה: איה נאפה" oninput="saveAllData()">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>שם המלון:</label>
                        <input type="text" id="hotelName" placeholder="שם המלון..." oninput="saveAllData()">
                    </div>
                    <div class="form-group">
                        <label>דירוג כוכבים:</label>
                        <select id="hotelStars" onchange="saveAllData()">
                            <option value="3">⭐⭐⭐ (3 כוכבים)</option>
                            <option value="4" selected>⭐⭐⭐⭐ (4 כוכבים)</option>
                            <option value="5">⭐⭐⭐⭐⭐ (5 כוכבים)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>🔗 קישור לתמונות המלון:</label>
                    <input type="text" id="hotelImagesLink" placeholder="הדבק קישור לתמונות/גלריה של המלון..."
                        oninput="saveAllData()">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
                    <div class="form-group">
                        <label>חודש:</label>
                        <select id="dealMonth" onchange="saveAllData()">
                            <option value="ינואר">ינואר</option>
                            <option value="פברואר">פברואר</option>
                            <option value="מרץ">מרץ</option>
                            <option value="אפריל">אפריל</option>
                            <option value="מאי">מאי</option>
                            <option value="יוני">יוני</option>
                            <option value="יולי" selected>יולי</option>
                            <option value="אוגוסט">אוגוסט</option>
                            <option value="ספטמבר">ספטמבר</option>
                            <option value="אוקטובר">אוקטובר</option>
                            <option value="נובמבר">נובמבר</option>
                            <option value="דצמבר">דצמבר</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>תאריך התחלה:</label>
                        <input type="date" id="startDate" onchange="saveAllData()">
                    </div>
                    <div class="form-group">
                        <label>תאריך סיום:</label>
                        <input type="date" id="endDate" onchange="saveAllData()">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>בסיס פנסיון:</label>
                        <select id="boardBasis" onchange="saveAllData()">
                            <option value="לינה וארוחת בוקר">לינה וארוחת בוקר</option>
                            <option value="חצי פנסיון">חצי פנסיון</option>
                            <option value="הכל כלול">הכל כלול</option>
                            <option value="לינה בלבד">לינה בלבד</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>העברות:</label>
                        <select id="transfers" onchange="saveAllData()">
                            <option value="כולל העברות">🚐 כולל העברות</option>
                            <option value="ללא העברות">ללא העברות</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- פרטי טיסות וכבודה -->
            <div class="card">
                <h2>✈️ פרטי טיסות וכבודה</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>🛫 טיסה הלוך (שעה/פרטים):</label>
                        <input type="text" id="flightOut" placeholder="לדוגמה: 06:00 בבוקר" oninput="saveAllData()">
                    </div>
                    <div class="form-group">
                        <label>🛬 טיסה חזור (שעה/פרטים):</label>
                        <input type="text" id="flightBack" placeholder="לדוגמה: 22:00 בלילה" oninput="saveAllData()">
                    </div>
                </div>
                <div class="form-group">
                    <label>🧳 בחירת סוג כבודה:</label>
                    <select id="luggageType" onchange="saveAllData()">
                        <option value="טרולי לכל נוסע">🎒 טרולי לכל נוסע</option>
                        <option value="מזוודה לכל נוסע">🧳 מזוודה לכל נוסע</option>
                        <option value="כולל מזוודה או תיק גב">🧳 כולל מזוודה או תיק גב</option>
                        <option value="תיק יד אישי בלבד">👜 תיק יד אישי בלבד</option>
                        <option value="custom">✍️ כתיבה חופשית...</option>
                    </select>
                </div>
                <div class="form-group" id="customLuggageDiv" style="display:none;">
                    <label>כתיבה חופשית לכבודה:</label>
                    <input type="text" id="customLuggage" placeholder="הקלד פרטי כבודה..." oninput="saveAllData()">
                </div>
            </div>

            <!-- מחיר והרכב -->
            <div class="card">
                <h2>💰 תמחור הדיל</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>סוג הרכב מחיר:</label>
                        <select id="priceType" onchange="saveAllData()">
                            <option value="לאדם (בהרכב זוגי)">לאדם (בהרכב זוגי)</option>
                            <option value="לזוג">לזוג</option>
                            <option value="למשפחה">למשפחה</option>
                            <option value="לכל הקבוצה">לכל הקבוצה</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>מחיר ב-₪:</label>
                        <input type="text" id="priceValue" placeholder="לדוגמה: 2250" oninput="saveAllData()">
                    </div>
                </div>
            </div>

            <!-- בנק פיצ'רים ענק ומורחב -->
            <div class="card">
                <h2>✨ בנק פיצ'רים חכמים מורחב</h2>
                <div class="checkbox-group" id="featuresBank">
                    <label class="checkbox-item"><input type="checkbox" class="smart-feature"
                            value="⚜️ מלון במיקום מרכזי" checked onchange="saveAllData()"> מלון במיקום מרכזי</label>
                    <label class="checkbox-item"><input type="checkbox" class="smart-feature" value="⚜️ בר במלון"
                            onchange="saveAllData()"> בר במלון</label>
                    <label class="checkbox-item"><input type="checkbox" class="smart-feature" value="⚜️ מרכז ספא במלון"
                            onchange="saveAllData()"> מרכז ספא במלון</label>
                    <label class="checkbox-item"><input type="checkbox" class="smart-feature" value="⚜️ בריכה במלון"
                            onchange="saveAllData()"> בריכה במלון</label>
                    <label class="checkbox-item"><input type="checkbox" class="smart-feature"
                            value="⚜️ טיסות ישראליות🇮🇱" checked onchange="saveAllData()"> טיסות ישראליות 🇮🇱</label>
                    <label class="checkbox-item"><input type="checkbox" class="smart-feature" value="🌊 נוף מרהיב לים"
                            onchange="saveAllData()"> נוף מרהיב לים</label>
                    <label class="checkbox-item"><input type="checkbox" class="smart-feature"
                            value="🍹 בר חטיפים ובריכה פעיל" onchange="saveAllData()"> בר חטיפים ובריכה</label>
                    <label class="checkbox-item"><input type="checkbox" class="smart-feature"
                            value=" Wi-Fi חינם בכל שטחי המלון" checked onchange="saveAllData()"> Wi-Fi חינם</label>
                    <label class="checkbox-item"><input type="checkbox" class="smart-feature"
                            value="🛎️ שירות קבלה 24/7" onchange="saveAllData()"> קבלה 24/7</label>
                    <label class="checkbox-item"><input type="checkbox" class="smart-feature"
                            value="👨‍👩‍👧‍👦 מתאים מאוד למשפחות וזוגות" onchange="saveAllData()"> מתאים
                        למשפחות/זוגות</label>
                    <label class="checkbox-item"><input type="checkbox" class="smart-feature"
                            value="⚡ מקומות אחרונים במחיר הזה!" checked onchange="saveAllData()"> מקומות
                        אחרונים!</label>
                    <label class="checkbox-item"><input type="checkbox" class="smart-feature"
                            value="🎯 בלעדי ללקוחות הדילים שלנו" onchange="saveAllData()"> בלעדי לחברי הקבוצה</label>
                </div>

                <div class="form-group" style="margin-top: 15px;">
                    <label>📝 שורת טקסט חופשי לבחירת הסוכן:</label>
                    <input type="text" id="agentCustomNote" placeholder="הקלד כאן הערה אישית משלך שתופיע בפוסט..."
                        oninput="saveAllData()">
                </div>
            </div>
        </div>

        <!-- צד ימין: תצוגה מקדימה -->
        <div>
            <div class="card" style="position: sticky; top: 20px;">
                <h2>📱 תצוגה מקדימה לפוסט בוואטסאפ</h2>
                <div class="preview-box" id="previewText">הזן פרטים כדי לראות את הפוסט מתעדכן אוטומטית...</div>
                <button class="btn" onclick="copyToClipboard()">📋 העתק פוסט מושלם לוואטסאפ</button>
            </div>
        </div>
    </div>

    <script>
        // טעינת נתונים שמורים בלחיצה ראשונה על העמוד
        window.onload = function () {
            const fields = ['agentCall', 'agentWhatsapp', 'agentGroup', 'destinationCountry', 'destinationCity', 'hotelName', 'hotelStars', 'hotelImagesLink', 'dealMonth', 'startDate', 'endDate', 'boardBasis', 'transfers', 'flightOut', 'flightBack', 'luggageType', 'customLuggage', 'priceType', 'priceValue', 'agentCustomNote'];

            fields.forEach(id => {
                if (localStorage.getItem(id) !== null) {
                    const el = document.getElementById(id);
                    if (el) el.value = localStorage.getItem(id);
                }
            });

            // הצגת שדה כבודה מותאם אם נבחר
            if (document.getElementById('luggageType').value === 'custom') {
                document.getElementById('customLuggageDiv').style.display = 'block';
            }

            updatePreview();
        };

        // שמירת כל הנתונים ל-localStorage אוטומטית בכל שינוי
        function saveAllData() {
            const fields = ['agentCall', 'agentWhatsapp', 'agentGroup', 'destinationCountry', 'destinationCity', 'hotelName', 'hotelStars', 'hotelImagesLink', 'dealMonth', 'startDate', 'endDate', 'boardBasis', 'transfers', 'flightOut', 'flightBack', 'luggageType', 'customLuggage', 'priceType', 'priceValue', 'agentCustomNote'];

            fields.forEach(id => {
                const el = document.getElementById(id);
                if (el) localStorage.setItem(id, el.value);
            });

            updatePreview();
        }

        function getFlag(country) {
            if (!country) return '✈️';
            const c = country.trim();
            if (c.includes('קפריסין')) return '🇨🇾';
            if (c.includes('יוון')) return '🇬🇷';
            if (c.includes('איטליה')) return '🇮🇹';
            if (c.includes('ספרד')) return '🇪🇸';
            if (c.includes('טורקיה')) return '🇹🇷';
            if (c.includes('דובאי') || c.includes('איחוד')) return '🇦🇪';
            if (c.includes('צרפת')) return '🇫🇷';
            if (c.includes('תאילנד')) return '🇹🇭';
            return '✈️';
        }

        document.getElementById('luggageType').addEventListener('change', function () {
            const customDiv = document.getElementById('customLuggageDiv');
            customDiv.style.display = (this.value === 'custom') ? 'block' : 'none';
            saveAllData();
        });

        function updatePreview() {
            const country = document.getElementById('destinationCountry').value.trim();
            const city = document.getElementById('destinationCity').value.trim();
            const hotel = document.getElementById('hotelName').value.trim();
            const starsNum = document.getElementById('hotelStars').value;
            const imagesLink = document.getElementById('hotelImagesLink').value.trim();

            const month = document.getElementById('dealMonth').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const board = document.getElementById('boardBasis').value;
            const transfers = document.getElementById('transfers').value;

            const flightOut = document.getElementById('flightOut').value.trim();
            const flightBack = document.getElementById('flightBack').value.trim();

            const luggageSelect = document.getElementById('luggageType').value;
            const customLuggage = document.getElementById('customLuggage').value.trim();
            const luggageText = (luggageSelect === 'custom') ? customLuggage : luggageSelect;

            const priceType = document.getElementById('priceType').value;
            const priceVal = document.getElementById('priceValue').value.trim();

            const agentCall = document.getElementById('agentCall').value.trim();
            const agentWhatsapp = document.getElementById('agentWhatsapp').value.trim();
            const agentGroup = document.getElementById('agentGroup').value.trim();
            const customNote = document.getElementById('agentCustomNote').value.trim();

            const flag = getFlag(country);
            const starsStr = '⭐'.repeat(Number(starsNum));

            let locationLine = '';
            if (country && city) {
                locationLine = `${flag} יעד: ${country} - ${city} ${flag}`;
            } else if (country || city) {
                locationLine = `${flag} יעד: ${country}${city} ${flag}`;
            } else {
                locationLine = `✈️ יעד: לבחירתכם`;
            }

            let hotelLine = hotel ? `🏨 מלון: ${hotel} ${starsStr}` : `🏨 מלון: לבחירה`;
            let imagesLine = imagesLink ? `📸 תמונות המלון: ${imagesLink}` : '';

            let dateLine = '';
            if (start && end) {
                dateLine = `📅 תאריכים: ${start} עד ${end} (${month})`;
            } else {
                dateLine = `📅 חודש: ${month}`;
            }

            let flightBlock = '';
            if (flightOut || flightBack || luggageText) {
                flightBlock = `✈️ טיסות:
🛫 הלוך - ${flightOut || 'בהתאמה אישית'}
🛬 חזור - ${flightBack || 'בהתאמה אישית'}
🧳 כבודה: ${luggageText || 'כלול'}`;
            }

            const selectedFeatures = Array.from(document.querySelectorAll('.smart-feature:checked'))
                .map(cb => `${cb.value}`)
                .join('\n');

            let priceSummaryLine = '';
            if (priceVal) {
                priceSummaryLine = `👌 טיסה + מלון ו${board}: ₪${priceVal} ${priceType}`;
            } else {
                priceSummaryLine = `👌 חבילת נופש מושלמת - פנו אלינו למחיר!`;
            }

            let contactBlock = '';
            if (agentCall) contactBlock += `\n👈 להזמנות חייגו עכשיו: ${agentCall}`;
            if (agentWhatsapp) contactBlock += `\n👈 לשליחת ווצאפ: ${agentWhatsapp}`;
            if (agentGroup) contactBlock += `\n👈 לעוד דילים בקבוצה שקטה: ${agentGroup}`;

            // הרכבת הפוסט עם מרווחים כפולים (רווח נעים ונקי לקריאה)
            const finalPost = `🔥 דיל חם שאסור לפספס בחודש ${month}! 🔥

${locationLine}

${hotelLine}

${imagesLine ? imagesLine + '\n\n' : ''}${dateLine}

🍽️ בסיס אירוח: ${board}

🚐 ${transfers}

${flightBlock ? flightBlock + '\n' : ''}
${selectedFeatures}

${customNote ? '\n💬 ' + customNote + '\n' : ''}
💰 מחיר:
${priceSummaryLine}

${contactBlock}

⛔ חשוב לזכור
המחיר נכון לרגע הפרסום ועלול להשתנות בכל עת ⏳

לדילים נוספים ניתן לפנות בפרטי! אני כאן כדי להתאים את הדיל בדיוק לצרכים ולרצונות שלך. 💬✈️
בוא נבנה יחד את החופשה המושלמת עבורך! 🌟`;

            document.getElementById('previewText').innerText = finalPost.replace(/^\s*[\r\n]/gm, '');
        }

        function copyToClipboard() {
            const text = document.getElementById('previewText').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('הפוסט הועתק בהצלחה ללוח!');
            });
        }

        updatePreview();
    </script>

</body>

</html>
