<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחולל דילים חכם - CRM</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media(max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        h2 {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.25rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            box-sizing: border-box;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .preview-box {
            background: #0f172a;
            color: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.9rem;
            min-height: 250px;
            max-height: 400px;
            overflow-y: auto;
            direction: rtl;
        }

        .btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container" style="max-width: 100%;">
        <div style="grid-column: 1 / -1;">
            <a href="index.html" class="back-link">← חזרה ללוח בקרה הראשי (CRM)</a>
        </div>

        <!-- טופס הזנת נתונים -->
        <div class="card">
            <h2>✈️ פרטי הדיל והגדרות סוכן</h2>

            <div class="form-group">
                <label>קישור קבוצת וואטסאפ / דילים (הגדרות סוכן):</label>
                <input type="text" id="agentGroupLink" placeholder="לדוגמה: https://chat.whatsapp.com/..."
                    oninput="updatePreview()">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group">
                    <label>שם היעד (מדינה):</label>
                    <input type="text" id="destinationCountry" placeholder="לדוגמה: קפריסין" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>שם העיר / אזור:</label>
                    <input type="text" id="destinationCity" placeholder="לדוגמה: איה נאפה" oninput="updatePreview()">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px;">
                <div class="form-group">
                    <label>שם המלון:</label>
                    <input type="text" id="hotelName" placeholder="שם המלון..." oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>דירוג כוכבים:</label>
                    <select id="hotelStars" onchange="updatePreview()">
                        <option value="3">⭐⭐⭐ (3 כוכבים)</option>
                        <option value="4" selected>⭐⭐⭐⭐ (4 כוכבים)</option>
                        <option value="5">⭐⭐⭐⭐⭐ (5 כוכבים)</option>
                    </select>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group">
                    <label>תאריך התחלה:</label>
                    <input type="date" id="startDate" onchange="updatePreview()">
                </div>
                <div class="form-group">
                    <label>תאריך סיום:</label>
                    <input type="date" id="endDate" onchange="updatePreview()">
                </div>
            </div>

            <div class="form-group">
                <label>מחיר לאדם (₪):</label>
                <input type="text" id="price" placeholder="לדוגמה: 1850" oninput="updatePreview()">
            </div>
        </div>

        <!-- תצוגה מקדימה -->
        <div class="card">
            <h2>📱 תצוגה מקדימה לפוסט</h2>
            <div class="preview-box" id="previewText">הזן פרטים כדי לראות את הפוסט מתעדכן אוטומטית...</div>
            <button class="btn" onclick="copyToClipboard()">📋 העתק פוסט מושלם לוואטסאפ</button>
        </div>
    </div>

    <script>
        // זיהוי דגל אוטומטי לפי שם המדינה
        function getFlag(country) {
            if (!country) return '✈️';
            const c = country.trim();
            if (c.includes('קפריסין')) return '🇨🇾';
            if (c.includes('יוון')) return '🇬🇷';
            if (c.includes('איטליה')) return '🇮🇹';
            if (c.includes('ספרד')) return '🇪🇸';
            if (c.includes('טורקיה')) return '🇹🇷';
            if (c.includes('דובאי') || c.includes('איחוד')) return '🇦🇪';
            if (c.includes('צרפת')) return '🇫🇷';
            return '✈️';
        }

        function updatePreview() {
            const country = document.getElementById('destinationCountry').value.trim();
            const city = document.getElementById('destinationCity').value.trim();
            const hotel = document.getElementById('hotelName').value.trim();
            const starsNum = document.getElementById('hotelStars').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const price = document.getElementById('price').value.trim();
            const groupLink = document.getElementById('agentGroupLink').value.trim();

            const flag = getFlag(country);
            const starsStr = '⭐'.repeat(Number(starsNum));

            let locationLine = '';
            if (country && city) {
                locationLine = `${flag} יעד: ${country} - ${city} ${flag}`;
            } else if (country || city) {
                locationLine = `${flag} יעד: ${country}${city} ${flag}`;
            } else {
                locationLine = `✈️ יעד: לבחירתכם`;
            }

            let hotelLine = hotel ? `🏨 מלון: ${hotel} ${starsStr}` : `🏨 מלון: לבחירה`;
            let dateLine = (start && end) ? `📅 תאריכים: ${start} עד ${end}` : `📅 תאריכים: בהתאמה אישית`;
            let priceLine = price ? `💰 מחיר לאדם: ₪${price}` : `💰 מחיר: פנו אלינו`;
            let linkLine = groupLink ? `🔗 להצטרפות לקבוצת הדילים שלנו:\n${groupLink}` : `🔗 פנו אלינו בוואטסאפ לפרטים נוספים!`;

            const finalPost = `🔥 דיל חם שאסור לפפס! 🔥

${locationLine}
${hotelLine}
${dateLine}
${priceLine}

✨ אל תפספסו את החופשה הבאה שלכם!
${linkLine}`;

            document.getElementById('previewText').innerText = finalPost;
        }

        function copyToClipboard() {
            const text = document.getElementById('previewText').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('הפוסט הועתק בהצלחה ללוח!');
            });
        }
    </script>

</body>

</html>
